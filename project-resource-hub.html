<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Hub — Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      padding: 2rem;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3.5rem 2.5rem;
      position: relative;
      z-index: 10;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(20px);
    }
    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      background: var(--gradient2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .login-header p {
      color: var(--text2);
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    .login-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--text2);
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="hero-bg" style="background: radial-gradient(ellipse at center, rgba(67, 233, 123, 0.1) 0%, transparent 70%);"></div>
  <div class="hero-grid"></div>

  <div class="login-card reveal visible">
    <div class="login-header">
      <div class="login-logo">Hub.</div>
      <p>EDUCATIVE RESOURCE PORTAL</p>
    </div>

    <form onsubmit="event.preventDefault(); alert('Demo: Access to resources is restricted during the maintenance period.');">
      <div class="form-group">
        <label for="email">Institutional Email</label>
        <input type="email" id="email" class="form-control" placeholder="name@school.edu.bd" required>
      </div>
      <div class="form-group">
        <label for="pass">Access Code</label>
        <input type="password" id="pass" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button class="btn btn-primary" style="width:100%; justify-content:center; background: var(--gradient2);">Explore Resources →</button>
    </form>

    <div class="login-footer">
      Looking for public files? <a href="#" style="color:var(--accent3);">Browse Gallery</a>
    </div>
    
    <div style="margin-top: 2rem; text-align: center;">
      <a href="index.html" style="font-size: 0.8rem; color: var(--text2);">← Back to Portfolio</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
